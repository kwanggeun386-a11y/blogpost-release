name: 다운로드/실행 확인
description: Blog Factory 릴리즈 파일을 다운로드하고 실행 확인을 남깁니다.
title: "[확인] Blog Factory 다운로드/실행 확인"
labels:
  - download-confirmed
body:
  - type: markdown
    attributes:
      value: |
        다운로드한 파일과 실행 결과를 남겨 주세요.
        GitHub는 누가 파일을 다운로드했는지 자동으로 공개하지 않으므로, 이 양식은 사용자 확인 기록용입니다.

  - type: input
    id: release_version
    attributes:
      label: 다운로드한 버전
      description: "예: v1.0.0"
      placeholder: v1.0.0
    validations:
      required: true

  - type: dropdown
    id: operating_system
    attributes:
      label: 운영체제
      options:
        - Windows 10/11
        - macOS Intel
        - macOS Apple Silicon
        - 기타
    validations:
      required: true

  - type: dropdown
    id: downloaded_file
    attributes:
      label: 다운로드한 파일
      options:
        - BlogFactory-Windows.zip
        - BlogFactory-Mac.zip
        - 기타
    validations:
      required: true

  - type: input
    id: user_name
    attributes:
      label: 확인자 이름 또는 닉네임
      description: 공개 Issue에 표시됩니다. 민감한 개인정보는 적지 마세요.
      placeholder: 홍길동 / 팀명 / 닉네임
    validations:
      required: true

  - type: dropdown
    id: run_status
    attributes:
      label: 실행 확인 상태
      options:
        - 다운로드 완료
        - 실행 성공
        - 실행 실패
        - 설치/보안 경고에서 막힘
    validations:
      required: true

  - type: textarea
    id: notes
    attributes:
      label: 메모
      description: 실행 실패 메시지, 확인한 화면, 특이사항을 적어 주세요.
      placeholder: "예: Start.bat 실행 후 브라우저에서 http://localhost:3001 화면 확인 완료"
    validations:
      required: false

  - type: checkboxes
    id: checks
    attributes:
      label: 확인 체크
      options:
        - label: 다운로드한 파일을 직접 실행해 봤습니다.
          required: false
        - label: 앱 첫 화면이 열리는 것을 확인했습니다.
          required: false
        - label: AI 설정 화면 또는 새 블로그 만들기 화면까지 확인했습니다.
          required: false
